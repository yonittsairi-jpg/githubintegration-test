ame: NodeJS

env:
  APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
  # NOTE: github.event.pull_request is null on "push" events.
  # On "push" to main, head.sha is empty so we fall back to github.sha.
  APPLITOOLS_BATCH_ID: ${{ github.event.pull_request.head.sha || github.sha }}

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies and Playwright
        run: |
          npm install
          npx playwright install --with-deps

      - name: Notify Applitools of push
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          PARENT_BRANCH_NAME="${GITHUB_BASE_REF:-main}"
          curl -L -d '' -X POST \
            "https://eyesapi.applitools.com/api/externals/github/push?apiKey=${APPLITOOLS_API_KEY}&CommitSha=${APPLITOOLS_BATCH_ID}&BranchName=${BRANCH_NAME}&ParentBranchName=${PARENT_BRANCH_NAME}"

      - name: Build and test
        run: |
          echo "Batch ID: $APPLITOOLS_BATCH_ID"
          npm run test-allure

  batch-completion-notification:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Update Applitools batch status
        run: |
          curl -L -X POST -H "accept: */*" \
            "https://eyesapi.applitools.com/api/externals/github/servers/github.com/commit/${APPLITOOLS_BATCH_ID}/complete?apiKey=${APPLITOOLS_API_KEY}"
        env:
          APPLITOOLS_BATCH_ID: ${{ github.event.pull_request.head.sha || github.sha }}
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
