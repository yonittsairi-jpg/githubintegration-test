name: NodeJS

env:
  # Using the correct secret syntax
  APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
  # NOTE: github.event.pull_request is null on "push" events. 
  # This logic handles PRs, but on "push" to main, BATCH_ID will be empty.
  BRANCH_NAME : "YONIT"
  APPLITOOLS_BATCH_ID: ${{ github.event.pull_request.head.sha || github.sha }}
  APPLITOOLS_ID_CANDIDATE: ${{ github.event.pull_request.merge_commit_sha }}
  APPLITOOLS_ID_CANDIDATE1: ${{ github.event.pull_request.head.sha }}
  APPLITOOLS_ID_CANDIDATE2: ${{ github.sha }}

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies & Install Playwright
        run: |
          npm install
          npx playwright install --with-deps

      - name: Build and Test
        run: |
          echo "Batch ID: $APPLITOOLS_BATCH_ID"
          echo "Candidate: $APPLITOOLS_ID_CANDIDATE"
          echo "Candidate 1: $APPLITOOLS_ID_CANDIDATE1"
          echo "Candidate 2: $APPLITOOLS_ID_CANDIDATE2"
            
          npm run test-allure

  # This is now a separate job, indented correctly under 'jobs'
  batch-completion-notification:
    runs-on: ubuntu-latest
    needs: [build] # Wait for the build job to finish
    if: always()   # Run even if tests fail
    steps:
      - name: Update Applitools batch status
        uses: wei/curl@v1.1.1
        with:
          # Fixed indentation and added "" for the empty -d flag
          args: -X POST -d -H "accept:*/*" https://eyesapi.applitools.com/api/externals/github/servers/github.com/commit/${{env.APPLITOOLS_BATCH_ID}}/complete?apiKey=${{env.APPLITOOLS_API_KEY}}



          
